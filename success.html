<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-in completed</title>
<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;background:#f5f5f5;margin:0;text-align:center;padding:20px
}
.card{
  background:#fff;padding:30px;border-radius:14px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  max-width:420px
}
h1{color:#208091;margin-bottom:10px}
p{color:#333;line-height:1.5}
</style>
</head>
<body>
<div class="card">
  <h1 id="title"></h1>
  <p id="text1"></p>
  <p id="text2"></p>
</div>
<script>
const savedLang = localStorage.getItem('selectedLang');
const browserLang = (navigator.language || 'en').split('-')[0];
const lang = savedLang || browserLang;

const t = {
  it: {
    title: "✅ Check-in completato",
    t1: "Il selfie è stato inviato correttamente.",
    t2: "Grazie per la collaborazione e buon soggiorno!"
  },
  en: {
    title: "✅ Check-in completed",
    t1: "Your selfie has been successfully sent.",
    t2: "Thank you for your cooperation and enjoy your stay!"
  },
  fr: {
    title: "✅ Enregistrement terminé",
    t1: "Votre selfie a été envoyé avec succès.",
    t2: "Merci pour votre coopération et bon séjour !"
  },
  de: {
    title: "✅ Check-in abgeschlossen",
    t1: "Ihr Selfie wurde erfolgreich gesendet.",
    t2: "Vielen Dank für Ihre Mitarbeit und einen angenehmen Aufenthalt!"
  },
  es: {
    title: "✅ Check-in completado",
    t1: "Tu selfie ha sido enviado correctamente.",
    t2: "Gracias por tu colaboración y buena estancia."
  }
};

const L = t[lang] || t.en;
document.documentElement.lang = (t[lang] ? lang : 'en');
document.getElementById("title").textContent = L.title;
document.getElementById("text1").textContent = L.t1;
document.getElementById("text2").textContent = L.t2;
</script>
</body>
</html>
